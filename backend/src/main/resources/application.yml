spring:
    application:
        name: bibliophiles-bazar

    config:
        import: optional:vault://secret/bibliophiles-bazar

    cloud:
        vault:
            uri: ${VAULT_URI:http://localhost:8200}
            token: ${VAULT_TOKEN:root}
            kv:
                enabled: true
                backend: secret
                default-context: bibliophiles-bazar
            fail-fast: true

    datasource:
        # Use ":-" syntax to provide a default fallback value if the property is missing
        url: ${vault.db.url:jdbc:mysql://localhost:3306/bibliophiles-bazar}
        username: ${vault.db.username:root}
        password: ${vault.db.password:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
            connection-timeout: 30000
            maximum-pool-size: 10
            minimum-idle: 5

    jpa:
        hibernate:
            ddl-auto: update
        database-platform: org.hibernate.dialect.MySQLDialect
        show-sql: false
